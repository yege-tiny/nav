# =================================================================
#  CONFIGURATION TEMPLATE FOR LOCAL DEVELOPMENT (`npm run dev`)
#
#  1. Copy this file to `wrangler.toml`.
#  2. Replace the D1/KV placeholder IDs with your own Cloudflare resources.
#  3. Keep your real `wrangler.toml` out of Git.
#
#  This file is not used for Cloudflare Pages dashboard deployment settings.
#  Production bindings and secrets should be configured in Cloudflare.
# =================================================================

name = "iori-nav"
compatibility_date = "2025-09-06"
pages_build_output_dir = "public"

[build]
command = "npm run build:css"

[[d1_databases]]
binding = "NAV_DB"
database_name = "book"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

[[kv_namespaces]]
binding = "NAV_AUTH"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

[vars]
ENABLE_PUBLIC_SUBMISSION = false
SITE_NAME = "灰色轨迹"
SITE_DESCRIPTION = "一个优雅、快速、易于部署的书签（网址）收藏与分享平台，完全基于 Cloudflare 全家桶构建"
FOOTER_TEXT = "曾梦想仗剑走天涯"
ICON_API = "https://faviconsnap.com/api/favicon?url="
AI_REQUEST_DELAY = "1500"

# Optional: configure both values to enable Cloudflare Turnstile locally.
# Do not commit real secret keys.
TURNSTILE_SITE_KEY = ""
TURNSTILE_SECRET_KEY = ""

# Optional: enable if you bind Cloudflare Workers AI for description generation.
# [ai]
# binding = "AI"
# remote = false
